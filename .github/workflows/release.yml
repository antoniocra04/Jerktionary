name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'release:')
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            builder_args: --win
          - platform: linux
            runner: ubuntu-22.04
            builder_args: --linux
          - platform: macos
            runner: macos-latest
            builder_args: --mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package app
        if: matrix.platform != 'macos'
        run: npx electron-builder ${{ matrix.builder_args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package macOS app directory
        if: matrix.platform == 'macos'
        run: npx electron-builder --mac dir --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Sign macOS app
        if: matrix.platform == 'macos'
        run: codesign --force --deep --sign - --entitlements build/entitlements.mac.plist release/mac-arm64/Jerktionary.app

      - name: Archive macOS app
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          ditto -c -k --sequesterRsrc --keepParent release/mac-arm64/Jerktionary.app "release/Jerktionary-${APP_VERSION}-mac-arm64.zip"
          hdiutil create -volname "Jerktionary" -srcfolder release/mac-arm64/Jerktionary.app -ov -format UDZO "release/Jerktionary-${APP_VERSION}-mac-arm64.dmg"

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "tag=v$(node -p "require('./package.json').version")" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jerktionary-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.deb
            release/*.tar.gz
            release/*.dmg
            release/*.zip

      - name: Attach files to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'release:')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release/*.exe
            release/*.deb
            release/*.tar.gz
            release/*.dmg
            release/*.zip
