name: Bug report
description: Report a reproducible problem
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start backend
        2. Run npm run dev
        3. Click ...
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: Windows 11, Ubuntu 24.04, macOS 15
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, screenshots, or backend errors.
